<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全扫描审计面板</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .table th { background-color: #f8f9fa; font-weight: 600; white-space: nowrap; }
        .table td { vertical-align: middle; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .nav-pills .nav-link { border-radius: 8px; margin-right: 10px; color: #495057; font-weight: 500; }
        .nav-pills .nav-link.active { background-color: #0d6efd; color: white; box-shadow: 0 2px 4px rgba(13,110,253,0.3); }
        .clickable-text { cursor: pointer; color: #0d6efd; text-decoration: underline; }
    </style>
</head>
<body>
    <!-- 使用 raw 标签，防止 Flask 解析 Vue 的双大括号 -->
    {% raw %}
    <div id="app" class="container-fluid py-4 px-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">🛡️ 安全扫描结果审计面板</h2>
        </div>

        <!-- 标签页 -->
        <ul class="nav nav-pills mb-4">
            <li class="nav-item">
                <button class="nav-link" :class="{ active: currentTable === 'ai_vulns' }" @click="switchTable('ai_vulns')">
                    🤖 AI 漏洞挖掘 (ai_vulns)
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" :class="{ active: currentTable === 'scan_results' }" @click="switchTable('scan_results')">
                    🔍 基础扫描结果 (scan_results)
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" :class="{ active: currentTable === 'sensitive_info' }" @click="switchTable('sensitive_info')">
                    🔑 敏感信息泄漏 (sensitive_info)
                </button>
            </li>
        </ul>

        <!-- 数据表格区域 -->
        <div class="card p-3">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th v-for="col in columns[currentTable]" :key="col">{{ col }}</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr v-if="loading"><td :colspan="columns[currentTable].length" class="text-center py-4">加载中...</td></tr>
                        <tr v-else-if="tableData.length === 0"><td :colspan="columns[currentTable].length" class="text-center py-4 text-muted">暂无数据</td></tr>
                        <tr v-else v-for="row in tableData" :key="row.id">
                            <td v-for="col in columns[currentTable]" :key="col">
                                <!-- 针对风险等级进行颜色高亮 -->
                                <span v-if="col === 'risk_level'" class="badge" :class="getRiskBadgeClass(row[col])">
                                    {{ row[col] }}
                                </span>
                                <!-- 针对 JSON 字段和长文本显示为按钮 -->
                                <span v-else-if="['expert_advice', 'params', 'caller_codes', 'ai_raw_analysis', 'context_code', 'test_suggestion'].includes(col)">
                                    <button v-if="row[col]" class="btn btn-sm btn-outline-primary" @click="showModal(col, row[col])">
                                        查看内容
                                    </button>
                                    <span v-else class="text-muted">-</span>
                                </span>
                                <!-- 普通字段 -->
                                <span v-else :title="row[col]">{{ row[col] || '-' }}</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- 分页控件 -->
            <div class="d-flex justify-content-between align-items-center mt-3" v-if="totalPages > 0">
                <span class="text-muted">共 {{ totalRecords }} 条记录，当前第 {{ currentPage }} / {{ totalPages }} 页</span>
                <nav>
                    <ul class="pagination mb-0">
                        <li class="page-item" :class="{ disabled: currentPage === 1 }">
                            <button class="page-link" @click="changePage(currentPage - 1)">上一页</button>
                        </li>
                        <li class="page-item" :class="{ disabled: currentPage === totalPages }">
                            <button class="page-link" @click="changePage(currentPage + 1)">下一页</button>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>

        <!-- 通用详情弹窗 Modal -->
        <div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-lg modal-dialog-scrollable">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">字段详情: {{ modalTitle }}</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body bg-light">
                        <pre class="mb-0" style="white-space: pre-wrap; word-wrap: break-word;"><code>{{ modalContent }}</code></pre>
                    </div>
                </div>
            </div>
        </div>

    </div>
    {% endraw %}
    <!-- raw 标签结束 -->

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                const currentTable = ref('ai_vulns');
                const tableData = ref([]);
                const currentPage = ref(1);
                const totalPages = ref(0);
                const totalRecords = ref(0);
                const loading = ref(false);
                const perPage = 10;

                const modalTitle = ref('');
                const modalContent = ref('');
                let bsModal = null;

                const columns = {
                    'ai_vulns': ['id', 'js_url', 'api_endpoint', 'http_method', 'risk_level', 'vuln_focus', 'expert_advice', 'params', 'created_at'],
                    'scan_results': ['id', 'url', 'domain', 'path', 'source_url', 'scan_depth', 'created_at'],
                    'sensitive_info': ['id', 'js_url', 'sensitive_value', 'context_code', 'caller_codes', 'risk_level', 'secret_type', 'test_suggestion', 'ai_raw_analysis', 'created_at']
                };

                const fetchData = async () => {
                    loading.value = true;
                    try {
                        const response = await fetch(`/api/data/${currentTable.value}?page=${currentPage.value}&per_page=${perPage}`);
                        const resData = await response.json();
                        tableData.value = resData.data;
                        currentPage.value = resData.page;
                        totalPages.value = resData.total_pages;
                        totalRecords.value = resData.total_records;
                    } catch (error) {
                        console.error("Failed to fetch data", error);
                    } finally {
                        loading.value = false;
                    }
                };

                const switchTable = (tableName) => {
                    currentTable.value = tableName;
                    currentPage.value = 1;
                    fetchData();
                };

                const changePage = (page) => {
                    if (page >= 1 && page <= totalPages.value) {
                        currentPage.value = page;
                        fetchData();
                    }
                };

                const getRiskBadgeClass = (level) => {
                    const l = (level || '').toLowerCase();
                    if (l === 'high' || l === 'critical') return 'bg-danger';
                    if (l === 'medium') return 'bg-warning text-dark';
                    if (l === 'low' || l === 'info') return 'bg-success';
                    return 'bg-secondary';
                };

                const showModal = (colName, content) => {
                    modalTitle.value = colName;
                    try {
                        const parsed = typeof content === 'string' ? JSON.parse(content) : content;
                        modalContent.value = JSON.stringify(parsed, null, 4);
                    } catch (e) {
                        modalContent.value = content;
                    }
                    if (!bsModal) bsModal = new bootstrap.Modal(document.getElementById('detailModal'));
                    bsModal.show();
                };

                onMounted(() => {
                    fetchData();
                });

                return {
                    currentTable, columns, tableData, currentPage, totalPages, totalRecords, loading,
                    switchTable, changePage, getRiskBadgeClass, showModal, modalTitle, modalContent
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
